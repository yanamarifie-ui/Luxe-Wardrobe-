<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Wardrobe | Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>LUXE <span>WARDROBE</span></h1>
                <div class="gold-divider"></div>
                <p>Sign in to your account</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="hello@luxe.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            
            <div class="register-section">
                <p>Don't have an account? <button id="showRegisterBtn" class="register-link-btn">Register Here</button></p>
            </div>
            
            <div class="guest-section">
                <div class="gold-divider light"></div>
                <p class="guest-text">Continue as <button id="guestBtn" class="guest-btn">Guest</button></p>
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-header">
                <h2>Create Account</h2>
                <div class="gold-divider small"></div>
                <p>Join Luxe Wardrobe for exclusive offers</p>
            </div>
            <form id="registerForm">
                <div class="input-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" required placeholder="Jane Doe">
                </div>
                <div class="input-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" required placeholder="hello@luxe.com">
                </div>
                <div class="input-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required placeholder="Create a password">
                </div>
                <div class="input-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" required placeholder="Confirm password">
                </div>
                <button type="submit" class="register-btn">Register</button>
            </form>
        </div>
    </div>
    
    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        // Sample user data from localStorage
        let users = JSON.parse(localStorage.getItem('users')) || [
            { email: "user@example.com", password: "password123", name: "Demo User" }
        ];

        // Save users to localStorage
        function saveUsers() {
            localStorage.setItem('users', JSON.stringify(users));
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', user.name);
                window.location.href = 'index.html';
            } else {
                alert('Invalid email or password. Please register first!');
            }
        });

        // Registration Modal
        const modal = document.getElementById('registerModal');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const closeBtn = document.querySelector('.close-modal');

        showRegisterBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Registration form
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Validation
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters!');
                return;
            }
            
            // Check if user already exists
            if (users.find(u => u.email === email)) {
                alert('User already exists! Please login.');
                modal.style.display = 'none';
                return;
            }
            
            // Create new user
            users.push({ name, email, password });
            saveUsers();
            
            alert('Registration successful! Please login.');
            modal.style.display = 'none';
            
            // Auto-fill login form
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        });

        // Guest button
        document.getElementById('guestBtn').addEventListener('click', function() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', 'guest@luxe.com');
            localStorage.setItem('userName', 'Guest User');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
